spring.datasource.url=${TEST_DB_URL:jdbc:h2:mem:workshop_test_db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_UPPER=FALSE}
spring.datasource.username=${TEST_DB_USER:sa}
spring.datasource.password=${TEST_DB_PASSWORD:}
spring.datasource.driver-class-name=${TEST_DB_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=${TEST_JPA_HIBERNATE_DDL_AUTO:none}
spring.jpa.database-platform=${TEST_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.show-sql=${TEST_JPA_SHOW_SQL:false}

spring.flyway.enabled=${TEST_FLYWAY_ENABLED:true}
spring.flyway.locations=${TEST_FLYWAY_LOCATIONS:classpath:db/migration,classpath:db/seed}
spring.flyway.baseline-on-migrate=${TEST_FLYWAY_BASELINE_ON_MIGRATE:false}

spring.modulith.events.jdbc-schema-initialization.enabled=${TEST_SPRING_MODULITH_EVENTS_JDBC_SCHEMA_INIT:false}
